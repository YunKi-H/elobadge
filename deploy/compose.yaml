services:
  app:
    image: ${CHESSBADGE_IMAGE:-ghcr.io/yunki-h/chessbadge:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      WEB_APP_URL: https://${APP_DOMAIN}
    expose:
      - "3000"
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    image: caddy:2.10.2-alpine
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
